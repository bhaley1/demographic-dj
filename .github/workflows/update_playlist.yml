name: Weekly Spotify Global Top 5 Scan

on:
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Spotify scan
        run: python main.py

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push CSV updates
        run: |
          if git diff --quiet global_track_history.csv; then
            echo "No changes to commit"
          else
            git add global_track_history.csv
            git commit -m "chore: update global track history - $(date +%Y-%m-%d)"
            git push
          fi
