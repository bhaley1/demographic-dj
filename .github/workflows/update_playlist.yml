name: Weekly Spotify Global Top 5 Update

on:
  schedule:
    # Runs at 00:00 every Friday
    - cron: '0 0 * * 5'
  workflow_dispatch: # Allows you to trigger it manually via a button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Spotify Script
        env:
          # Pulls the API keys from your GitHub Secrets
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
        run: python main.py

      - name: Commit and Push CSV Log
        # This step saves your history.csv back to the GitHub repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add global_track_history.csv
          git commit -m "Automated update: Added this week's tracks to log" || echo "No changes to commit"
          git push
